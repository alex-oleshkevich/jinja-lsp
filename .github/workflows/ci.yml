# REQ-REL-01/02/03/04: CI gates — lint, Rust tests, Python E2E — on Linux, macOS, Windows.

name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # REQ-REL-01: Lint gate — clippy + rustfmt.
  lint:
    name: Lint (${{ matrix.os }})
    # REQ-REL-04: three host OSes.
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --check
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings
      # REQ-REL-11: Cargo.lock must not be stale.
      - name: cargo update --locked
        run: cargo update --locked --workspace

  # REQ-REL-02: Rust test gate — cargo nextest, including golden fixtures.
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      # REQ-REL-11: reproducible build with --locked.
      - name: cargo nextest run
        run: cargo nextest run --locked

  # REQ-REL-03: Python E2E gate — pytest-lsp on Linux only.
  e2e:
    name: Python E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build binary
        run: cargo build --locked --release
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pytest-lsp
        run: pip install pytest pytest-lsp lsprotocol
      - name: Run pytest-lsp E2E suite
        env:
          JINJA_LSP_BINARY: ${{ github.workspace }}/target/release/jinja-lsp
        run: pytest tests/e2e/ -v
