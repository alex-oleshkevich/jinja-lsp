# REQ-REL-05/06/09/11/13/14: Release workflow — cross-compile, sign, publish.
# Triggered by a semver tag (e.g. v0.2.0). REQ-REL-09: fails if tag != Cargo.toml version.

name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write
  id-token: write    # REQ-REL-13: OIDC for signed provenance via sigstore/cosign
  attestations: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # REQ-REL-09: tag↔Cargo.toml version gate.
  version-gate:
    name: Tag == Cargo.toml version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify tag matches Cargo.toml version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          CARGO_VER=$(grep '^version' Cargo.toml | head -1 | sed 's/.*= *"\(.*\)"/\1/')
          if [ "$TAG" != "$CARGO_VER" ]; then
            echo "Tag $GITHUB_REF_NAME does not match Cargo.toml version $CARGO_VER"
            exit 1
          fi
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}

  # REQ-REL-05: four cross-compiled targets.
  build:
    name: Build (${{ matrix.target }})
    needs: version-gate
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            use_cross: false
            archive_ext: tar.gz
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            use_cross: true
            archive_ext: tar.gz
          - target: aarch64-apple-darwin
            runner: macos-latest
            use_cross: false
            archive_ext: tar.gz
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            use_cross: false
            archive_ext: zip
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      # REQ-REL-11: reproducible --locked build.
      - name: Build with cross (Linux aarch64)
        if: matrix.use_cross
        run: |
          cargo install cross --git https://github.com/cross-rs/cross
          cross build --release --locked --target ${{ matrix.target }}

      - name: Build native
        if: "!matrix.use_cross"
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package (Linux/macOS)
        if: matrix.archive_ext == 'tar.gz'
        run: |
          BINARY=target/${{ matrix.target }}/release/jinja-lsp
          ARCHIVE=jinja-lsp-${{ matrix.target }}.tar.gz
          tar czf "$ARCHIVE" -C "$(dirname $BINARY)" "$(basename $BINARY)"
          sha256sum "$ARCHIVE" > "$ARCHIVE.sha256"
          echo "ARCHIVE=$ARCHIVE" >> $GITHUB_ENV

      - name: Package (Windows)
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: |
          $BINARY = "target\${{ matrix.target }}\release\jinja-lsp.exe"
          $ARCHIVE = "jinja-lsp-${{ matrix.target }}.zip"
          Compress-Archive -Path $BINARY -DestinationPath $ARCHIVE
          $hash = (Get-FileHash $ARCHIVE -Algorithm SHA256).Hash.ToLower()
          "$hash  $ARCHIVE" | Out-File -Encoding ASCII "$ARCHIVE.sha256"
          echo "ARCHIVE=$ARCHIVE" | Out-File -FilePath $env:GITHUB_ENV -Append

      # REQ-REL-13: signed provenance via GitHub Attestations (SLSA L2).
      - name: Generate provenance attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: ${{ env.ARCHIVE }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha256

  # REQ-REL-10: platform wheels via maturin.
  wheels:
    name: PyPI wheels
    needs: version-gate
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: manylinux_2_28
          - runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            manylinux: manylinux_2_28
          - runner: macos-latest
            target: aarch64-apple-darwin
            manylinux: ""
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux || 'auto' }}
          args: --release --locked --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.target }}
          path: dist/*.whl

  # REQ-REL-06/14: publish to four channels in order: GitHub Release → crates.io → PyPI → VS Code.
  publish:
    name: Publish
    needs: [build, wheels]
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      # REQ-REL-14: 1) GitHub Release (with checksums).
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/binary-*/*
          generate_release_notes: true

      # REQ-REL-14: 2) crates.io.
      - uses: dtolnay/rust-toolchain@stable
      # REQ-REL-12: --locked ensures grammar dependency matches committed Cargo.lock.
      - name: Publish to crates.io
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      # REQ-REL-14: 3) PyPI.
      - name: Collect wheels
        run: |
          mkdir -p dist
          cp artifacts/wheel-*/*.whl dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
