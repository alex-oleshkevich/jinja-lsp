# REQ-REL-05/06/08/09/11/13/14: Release workflow — cross-compile, sign, publish.
# Triggered by a semver tag (e.g. v0.2.0). REQ-REL-09: fails if tag != Cargo.toml version.
# REQ-REL-08: fails if CHANGELOG.md has no dated entry for the tag version.

name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write
  id-token: write    # REQ-REL-13: OIDC for signed provenance via sigstore/cosign
  attestations: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # REQ-REL-09: tag↔Cargo.toml version gate.
  version-gate:
    name: Tag == Cargo.toml version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify tag matches Cargo.toml version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          CARGO_VER=$(grep '^version' Cargo.toml | head -1 | sed 's/.*= *"\(.*\)"/\1/')
          if [ "$TAG" != "$CARGO_VER" ]; then
            echo "Tag $GITHUB_REF_NAME does not match Cargo.toml version $CARGO_VER"
            exit 1
          fi
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}

  # REQ-REL-08: CHANGELOG release gate — abort if tag version has no dated section.
  changelog-gate:
    name: CHANGELOG has dated section for ${{ github.ref_name }}
    needs: version-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify CHANGELOG entry
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          # Accept lines like: ## [0.2.0] - 2026-06-30  or  ## 0.2.0 - 2026-06-30
          if ! grep -qE "^## \[?${TAG}\]? - [0-9]{4}-[0-9]{2}-[0-9]{2}" CHANGELOG.md; then
            echo "CHANGELOG.md has no dated entry for version ${TAG}. Aborting release."
            exit 1
          fi
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}

  # REQ-REL-05: four cross-compiled targets.
  build:
    name: Build (${{ matrix.target }})
    needs: changelog-gate
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            use_cross: false
            archive_ext: tar.gz
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            use_cross: true
            archive_ext: tar.gz
          - target: aarch64-apple-darwin
            runner: macos-latest
            use_cross: false
            archive_ext: tar.gz
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            use_cross: false
            archive_ext: zip
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      # REQ-REL-11: reproducible --locked build.
      - name: Build with cross (Linux aarch64)
        if: matrix.use_cross
        run: |
          cargo install cross --git https://github.com/cross-rs/cross
          cross build --release --locked --target ${{ matrix.target }}

      - name: Build native
        if: "!matrix.use_cross"
        run: cargo build --release --locked --target ${{ matrix.target }}

      # REQ-REL-05: version-prefixed archive name: jinja-lsp-vX.Y.Z-<target>.tar.gz
      - name: Package (Linux/macOS)
        if: matrix.archive_ext == 'tar.gz'
        run: |
          BINARY=target/${{ matrix.target }}/release/jinja-lsp
          ARCHIVE=jinja-lsp-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
          tar czf "$ARCHIVE" -C "$(dirname $BINARY)" "$(basename $BINARY)"
          sha256sum "$ARCHIVE" > "$ARCHIVE.sha256"
          sha256sum "$BINARY" | awk '{print $1}' > "$ARCHIVE.binary.sha256"
          echo "ARCHIVE=$ARCHIVE" >> $GITHUB_ENV

      - name: Package (Windows)
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: |
          $BINARY = "target\${{ matrix.target }}\release\jinja-lsp.exe"
          $ARCHIVE = "jinja-lsp-${{ github.ref_name }}-${{ matrix.target }}.zip"
          Compress-Archive -Path $BINARY -DestinationPath $ARCHIVE
          $hash = (Get-FileHash $ARCHIVE -Algorithm SHA256).Hash.ToLower()
          "$hash  $ARCHIVE" | Out-File -Encoding ASCII "$ARCHIVE.sha256"
          $binHash = (Get-FileHash $BINARY -Algorithm SHA256).Hash.ToLower()
          $binHash | Out-File -Encoding ASCII "$ARCHIVE.binary.sha256"
          echo "ARCHIVE=$ARCHIVE" | Out-File -FilePath $env:GITHUB_ENV -Append

      # REQ-REL-13: signed provenance via GitHub Attestations (SLSA L2).
      - name: Generate provenance attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: ${{ env.ARCHIVE }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha256
            ${{ env.ARCHIVE }}.binary.sha256

  # REQ-REL-10: platform wheels via maturin.
  # REQ-REL-14: wheels must depend on build so a binary build failure aborts wheel builds early.
  wheels:
    name: PyPI wheels
    needs: [changelog-gate, build]
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: manylinux_2_28
          - runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            manylinux: manylinux_2_28
          - runner: macos-latest
            target: aarch64-apple-darwin
            manylinux: ""
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux || 'auto' }}
          args: --release --locked --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.target }}
          path: dist/*.whl

  # REQ-REL-06/14: publish to four channels in order: GitHub Release → crates.io → PyPI → VS Code.
  publish:
    name: Publish
    needs: [build, wheels]
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      # REQ-REL-14: 1) GitHub Release (with checksums).
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/binary-*/*
          generate_release_notes: true

      # REQ-REL-14: 2) crates.io.
      # NOTE: crates.io rejects git dependencies, and tree-sitter-jinja(-inline)
      # here are pinned via `git = ...` to a specific grammar-repo revision, not
      # a published crates.io version — `cargo publish` will fail on that until
      # the grammar is published separately and Cargo.toml switches to a version
      # dependency. continue-on-error keeps that failure from blocking PyPI/VS
      # Code/AUR, which don't share this constraint.
      - uses: dtolnay/rust-toolchain@stable
      # REQ-REL-12: --locked ensures grammar dependency matches committed Cargo.lock.
      - name: Publish to crates.io
        continue-on-error: true
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      # REQ-REL-14: 3) PyPI.
      - name: Collect wheels
        run: |
          mkdir -p dist
          cp artifacts/wheel-*/*.whl dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

      # REQ-REL-14: 4) VS Code Marketplace.
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Publish to VS Code Marketplace
        working-directory: editors/vscode
        run: |
          npm ci
          npx vsce publish --no-dependencies
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

  # REQ-REL-14: 5) AUR (jinja-lsp-bin) — depends on `publish` so the GitHub Release
  # (and its checksummed binaries) exists before the AUR package references it.
  # Requires repo secrets AUR_USERNAME, AUR_EMAIL, AUR_SSH_PRIVATE_KEY (an SSH
  # keypair registered against an AUR account with the jinja-lsp-bin package
  # reserved) — see aur/README.md for setup.
  aur-publish:
    name: Publish to AUR
    needs: publish
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      # Fill in this release's version and the Linux binaries' checksums (already
      # computed during the build job) so the AUR package installs the exact
      # binary this release published, with no re-download/re-hash round trip.
      - name: Render PKGBUILD for this release
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          X86_SHA=$(awk '{print $1}' artifacts/binary-x86_64-unknown-linux-gnu/*.tar.gz.sha256)
          ARM_SHA=$(awk '{print $1}' artifacts/binary-aarch64-unknown-linux-gnu/*.tar.gz.sha256)
          sed \
            -e "s/^pkgver=.*/pkgver=${VERSION}/" \
            -e "s/^sha256sums_x86_64=.*/sha256sums_x86_64=('${X86_SHA}')/" \
            -e "s/^sha256sums_aarch64=.*/sha256sums_aarch64=('${ARM_SHA}')/" \
            aur/PKGBUILD > /tmp/PKGBUILD

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v4
        with:
          pkgname: jinja-lsp-bin
          pkgbuild: /tmp/PKGBUILD
          test: true
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${{ github.ref_name }}"
