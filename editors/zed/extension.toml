# REQ-EDIT-07: Zed extension manifest.
# Language-server id is jinja2-lsp and language is Jinja2 (HTML),
# ported verbatim from the legacy .zed/settings.json so existing configs keep working.

[extension]
id = "jinja-lsp"
name = "Jinja LSP"
version = "0.1.0"
description = "Jinja2 template support via jinja-lsp"
authors = ["alex-oleshkevich"]
repository = "https://github.com/alex-oleshkevich/jinja-lsp"

[grammars.jinja]
repository = "https://github.com/alex-oleshkevich/tree-sitter-jinja"
commit = "e589222a1ad44361bc376d5abdccd08e1fecfee5"

[language_servers.jinja2-lsp]
name = "jinja-lsp"
languages = ["Jinja2 (HTML)"]
